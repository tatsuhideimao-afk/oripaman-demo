<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オリパーマン 演出デモ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  font-family: 'Noto Serif JP', serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
.oripa-stage {
  position: relative;
  width: 100%;
  max-width: 420px;
  height: 700px;
  background: #0a0a0a;
  border-radius: 16px;
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
}
.screen { position: absolute; inset: 0; display: none; }
.screen.active { display: flex; }
#screen-home { flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
#screen-play { display: none; }
#screen-play.active { display: block; }
#screen-result { flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: #0a0a0a; }

.home-logo { max-width: 80%; margin-bottom: 30px; }
.home-pt-label { font-size: 14px; color: #888; margin-bottom: 8px; }
.home-pt { font-size: 28px; font-weight: 500; color: #FFD700; margin-bottom: 30px; }
.gacha-btn {
  background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
  color: #0a0a0a;
  border: 3px solid #FFD700;
  padding: 16px 48px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,215,0,0.5);
  font-family: inherit;
}
.home-rates { margin-top: 24px; font-size: 12px; color: #666; }

#butsu-wrap { position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
#butsu {
  width: 160px;
  height: 160px;
  background-image: url('assets/characters/oripaman-medal.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  position: relative;
  z-index: 2;
  transition: filter 0.3s;
}
#ensyu-area {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 24px;
  text-align: center;
  padding: 12px;
  pointer-events: none;
}
#bg-stage { position: absolute; inset: 0; background: #0a0a0a; z-index: -1; }
#suggest-label {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #fff;
  opacity: 0;
  letter-spacing: 4px;
}

.result-status { font-size: 24px; margin-bottom: 12px; color: #FFD700; }
.result-rarity { font-size: 48px; font-weight: 700; margin-bottom: 16px; color: #FFD700; }
.result-card {
  width: 180px;
  height: 250px;
  background: linear-gradient(135deg, #FFD700, #FF1493);
  border-radius: 12px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0a0a0a;
  font-size: 14px;
  font-weight: 500;
}
.retry-btn {
  background: transparent;
  color: #FFD700;
  border: 2px solid #FFD700;
  padding: 12px 32px;
  font-size: 16px;
  border-radius: 50px;
  cursor: pointer;
  font-family: inherit;
}

.debug-panel {
  max-width: 420px;
  margin: 16px auto 0;
  padding: 12px;
  background: #1a1a1a;
  border-radius: 8px;
  width: 100%;
}
.debug-label { font-size: 12px; color: #888; margin-bottom: 8px; }
.debug-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
.dbg-btn {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  background: #222;
}

/* リール共通 */
.sym-7-nera { color: #FF0000; font-size: 56px; font-weight: 900; font-family: 'Orbitron', 'Arial Black', sans-serif; text-shadow: 0 0 8px #FF0000, 0 0 16px #FFD700; -webkit-text-stroke: 2px #FFD700; line-height: 1; }
.sym-other-nera { color: #888; font-size: 16px; font-weight: 500; }
.reel-nera { width: 78px; height: 198px; background: #fff; border: 3px solid #FFD700; border-radius: 4px; overflow: hidden; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
.reel-inner-nera { position: absolute; width: 100%; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; }
.reel-cell-nera { width: 100%; height: 66px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.reel-frame-nera { position: absolute; top: 66px; left: -3px; right: -3px; height: 66px; border-top: 3px solid #FFD700; border-bottom: 3px solid #FFD700; pointer-events: none; box-shadow: inset 0 0 15px rgba(255,215,0,0.4); }
.tempai-glow { animation: tempaiPulse 0.4s ease infinite alternate; }
@keyframes tempaiPulse { from { box-shadow: 0 0 20px #FFD700, inset 0 0 20px rgba(255,215,0,0.5); } to { box-shadow: 0 0 50px #FFD700, 0 0 80px #FF0000, inset 0 0 30px rgba(255,255,255,0.6); } }
@keyframes sevenPulse { from { text-shadow: 0 0 8px #FF0000, 0 0 16px #FFD700; transform: scale(1); } to { text-shadow: 0 0 20px #FF0000, 0 0 40px #FFD700, 0 0 60px #fff; transform: scale(1.15); } }
@keyframes rainbow-shift { 0%,100% { background-position: 0% 50% } 50% { background-position: 100% 50% } }

/* 次回予告用リール */
.yokoku .sym-7 { color: #FF0000; font-size: 40px; font-weight: 900; font-family: 'Orbitron','Arial Black',sans-serif; text-shadow: 0 0 6px #FF0000, 0 0 12px #FFD700; -webkit-text-stroke: 1.5px #FFD700; line-height: 1; }
.yokoku .sym-bar { color: #fff; font-size: 14px; font-weight: 900; background: #000; padding: 4px 6px; border-radius: 3px; border: 2px solid #FFD700; }
.yokoku .sym-cherry { font-size: 30px; }
.yokoku .sym-watermelon { font-size: 30px; }
.yokoku .sym-bell { font-size: 26px; }
.yokoku .sym-replay { color: #4169E1; font-size: 18px; font-weight: 900; }
.yokoku .reel { width: 68px; height: 168px; background: #fff; border: 3px solid #FFD700; border-radius: 4px; overflow: hidden; position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
.yokoku .reel-inner { position: absolute; width: 100%; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; }
.yokoku .reel-cell { width: 100%; height: 56px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.yokoku .reel-frame { position: absolute; top: 56px; left: -3px; right: -3px; height: 56px; border-top: 3px solid #FFD700; border-bottom: 3px solid #FFD700; pointer-events: none; box-shadow: inset 0 0 12px rgba(255,215,0,0.4); }
.lcd-frame { width: 100%; aspect-ratio: 16/8; background: linear-gradient(180deg, #0d1b3d 0%, #1a2f5c 100%); border: 4px solid #2a2a2a; border-radius: 8px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 4px 20px rgba(0,0,0,0.5); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.lcd-content { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
.lcd-normal { color: #FFD700; font-size: 14px; letter-spacing: 4px; font-family: 'Orbitron','Arial Black',sans-serif; opacity: 0.7; }
.yokoku-text-blue { color: #1E90FF; font-size: 28px; font-weight: 900; font-family: 'Orbitron','Arial Black',sans-serif; letter-spacing: 6px; text-shadow: 0 0 15px #1E90FF; }
.yokoku-text-red { color: #FF0000; font-size: 32px; font-weight: 900; font-family: 'Orbitron','Arial Black',sans-serif; letter-spacing: 6px; text-shadow: 0 0 20px #FF0000, 0 0 30px #FFD700; }
.yokoku-icon { font-size: 60px; }
.yokoku-label { color: #FFD700; font-size: 16px; letter-spacing: 4px; font-weight: 900; }

/* クルーン */
.kurun-stage { width: 280px; height: 280px; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
.kurun-stage-bg { background: radial-gradient(circle, #fff 0%, #ddd 80%); border: 8px solid #FFD700; }
.kurun-hole { position: absolute; border-radius: 50%; background: #000; box-shadow: inset 0 0 8px rgba(0,0,0,0.8); }
.kurun-hole.win { background: radial-gradient(circle, #FFD700 0%, #FFA500 100%); box-shadow: 0 0 20px #FFD700, inset 0 0 8px #FF6B00; animation: holeShine 0.5s ease infinite alternate; }
@keyframes holeShine { from { box-shadow: 0 0 15px #FFD700, inset 0 0 8px #FF6B00; } to { box-shadow: 0 0 35px #FFD700, 0 0 50px #FF0000, inset 0 0 12px #FF6B00; } }
.kurun-ball { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, #fff, #888); box-shadow: 0 0 12px #fff; z-index: 5; }
.stage-label { color: #fff; font-size: 14px; letter-spacing: 4px; font-family: 'Orbitron','Arial Black',sans-serif; opacity: 0.7; margin-bottom: 8px; }

/* 必殺技 */
.oripaman-pose-base { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #FFD700; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 500; text-align: center; position: relative; }
.gauge-outer { width: 280px; height: 40px; background: #1a1a1a; border: 3px solid #FFD700; border-radius: 25px; overflow: hidden; position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
.gauge-inner { height: 100%; width: 0%; background: linear-gradient(90deg, #00FF00 0%, #FFD700 60%, #FF0000 90%, #fff 100%); transition: width 0.1s; }
.gauge-inner.max { animation: gaugeMax 0.3s ease infinite alternate; }
@keyframes gaugeMax { from { box-shadow: inset 0 0 20px #fff, 0 0 20px #FFD700; } to { box-shadow: inset 0 0 30px #fff, 0 0 40px #FF0000, 0 0 60px #FFD700; } }
.punch-btn { padding: 20px 40px; background: linear-gradient(180deg, #FF1493 0%, #C5283D 100%); color: #fff; border: 4px solid #FFD700; border-radius: 50px; font-size: 22px; font-weight: 900; cursor: pointer; font-family: 'Orbitron','Arial Black',sans-serif; box-shadow: 0 0 30px rgba(255,20,147,0.8); letter-spacing: 4px; user-select: none; }
.punch-btn:active { transform: scale(0.92); }

/* 演出テキスト画像表示用 */
.ensyu-img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style>
</head>
<body>

<div class="oripa-stage" id="oripa-stage">

<div class="screen active" id="screen-home">
<img src="assets/characters/logo.png" alt="オリパーマン" class="home-logo">
<div class="home-pt-label">所持ポイント</div>
<div class="home-pt" id="pt-display">10,000 pt</div>
<button class="gacha-btn" id="gacha-btn">ガチャを引く（100pt）</button>
<div class="home-rates">SSR: 0.1% / SR: 0.9% / R: 9% / N: 90%</div>
</div>

<div class="screen" id="screen-play">
<div id="butsu-wrap">
<div id="butsu"></div>
</div>
<div id="ensyu-area"></div>
<div id="bg-stage"></div>
<div id="suggest-label"></div>
</div>

<div class="screen" id="screen-result">
<div class="result-status" id="result-status"></div>
<div class="result-rarity" id="result-rarity"></div>
<div class="result-card">CARD</div>
<button class="retry-btn" id="retry-btn">もう一度引く</button>
</div>

</div>

<div class="debug-panel">
<div class="debug-label">デバッグボタン</div>
<div class="debug-buttons" id="dbg-area"></div>
</div>

<script src="assets/vendor/gsap.min.js"></script>
<script>
(function(){
'use strict';

const $ = function(id) { return document.getElementById(id); };
let pt = 10000;
let isPlaying = false;

const COLORS = {
  blue: { main: '#1E90FF', glow: 'rgba(30,144,255,1)', name: '青' },
  green: { main: '#00FF00', glow: 'rgba(0,255,0,1)', name: '緑' },
  red: { main: '#FF0000', glow: 'rgba(255,0,0,1)', name: '赤' },
  rainbow: { main: '#FFD700', glow: 'rgba(255,215,0,1)', name: 'レインボー' }
};
const RAINBOW_GRAD = 'linear-gradient(135deg, #FF0000, #FFD700, #00FF00, #1E90FF, #8B00FF)';

// 画像パスの定義（GitHub上のパス）
const IMG = {
  oripaman_main: 'assets/characters/oripaman-main.png',
  oripaman_hissatsu: 'assets/characters/oripaman-hissatsu.png',
  oripaman_down: 'assets/characters/oripaman-down.png',
  oripaman_medal: 'assets/characters/oripaman-medal.png',
  logo: 'assets/characters/logo.png',
  nerae_blue: 'assets/text/nerae-blue.png',
  nerae_green: 'assets/text/nerae-green.png',
  nerae_red: 'assets/text/nerae-red.png',
  nerae_rainbow: 'assets/text/nerae-rainbow.png',
  tenpai: 'assets/text/tenpai.png',
  kakutei: 'assets/text/kakutei.png',
  jikai_yokoku: 'assets/text/jikai-yokoku.png',
  oo_atari: 'assets/text/oo-atari.png',
  freeze_challenge: 'assets/text/freeze-challenge.png',
  sym_7: 'assets/symbols/sym-7.png',
  sym_bar: 'assets/symbols/sym-bar.png',
  sym_cherry: 'assets/symbols/sym-cherry.png',
  sym_bell: 'assets/symbols/sym-bell.png',
  sym_replay: 'assets/symbols/sym-replay.png'
};

const DBG_BUTTONS = [
  { label: '青狙え×', color: 'blue', route: 'nera', hit: 0 },
  { label: '緑狙え○', color: 'green', route: 'nera', hit: 1 },
  { label: '赤狙え○', color: 'red', route: 'nera', hit: 1 },
  { label: '虹狙え確', color: 'rainbow', route: 'nera', hit: 1 },
  { label: '赤フリーズ○', color: 'red', route: 'harakiri', hit: 1 },
  { label: '虹フリーズ確', color: 'rainbow', route: 'harakiri', hit: 1 },
  { label: '緑クルーン穴1', color: 'green', route: 'kurun', holes: 1 },
  { label: '赤クルーン穴2', color: 'red', route: 'kurun', holes: 2 },
  { label: '虹クルーン穴4', color: 'rainbow', route: 'kurun', holes: 4 },
  { label: '緑必殺×', color: 'green', route: 'hissatsu', hit: 0 },
  { label: '赤必殺○', color: 'red', route: 'hissatsu', hit: 1 },
  { label: '虹必殺確', color: 'rainbow', route: 'hissatsu', hit: 1 },
  { label: '弱チェ揃○', color: 'red', route: 'yokoku', yokoku: 'weakcherry', mode: 'normal_hit' },
  { label: '弱チェ揃×', color: 'red', route: 'yokoku', yokoku: 'weakcherry', mode: 'normal_miss' },
  { label: '弱チェ→ｽｲｶ化け', color: 'rainbow', route: 'yokoku', yokoku: 'weakcherry', mode: 'bake' },
  { label: 'スイカ揃○', color: 'red', route: 'yokoku', yokoku: 'watermelon', mode: 'normal_hit' },
  { label: 'スイカ→ﾁｬﾝｽ目化け', color: 'rainbow', route: 'yokoku', yokoku: 'watermelon', mode: 'bake' },
  { label: 'チャンス目○', color: 'red', route: 'yokoku', yokoku: 'chance', mode: 'normal_hit' },
  { label: '強チェ○', color: 'red', route: 'yokoku', yokoku: 'strongcherry', mode: 'normal_hit' },
  { label: '強チャンス目確', color: 'rainbow', route: 'yokoku', yokoku: 'strongchance', mode: 'normal_hit' }
];

function setupDebugButtons() {
  const area = $('dbg-area');
  DBG_BUTTONS.forEach(function(b) {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    let borderColor = '#666';
    if (b.color === 'blue') borderColor = '#1E90FF';
    else if (b.color === 'green') borderColor = '#00C800';
    else if (b.color === 'red') borderColor = '#FF0000';
    else if (b.color === 'rainbow') borderColor = '#FFD700';
    btn.style.cssText = 'font-size:11px;padding:4px 8px;border:0.5px solid ' + borderColor + ';color:' + borderColor + ';background:#222;border-radius:6px;cursor:pointer;font-family:inherit;';
    btn.className = 'dbg-btn';
    btn.addEventListener('click', function() {
      play(b.color, b.route, b.hit, b.holes, b.yokoku, b.mode);
    });
    area.appendChild(btn);
  });
}

function bgForColor(color, opacity) {
  opacity = opacity || 0.3;
  if (color === 'rainbow') return 'linear-gradient(135deg, rgba(255,0,0,' + opacity + '), rgba(255,215,0,' + opacity + '), rgba(0,255,0,' + opacity + '), rgba(30,144,255,' + opacity + '), rgba(139,0,255,' + opacity + '))';
  return 'radial-gradient(circle, ' + COLORS[color].main + '33 0%, #0a0a0a 80%)';
}
function showScreen(id) {
  ['screen-home','screen-play','screen-result'].forEach(function(s) {
    const el = $(s);
    el.classList.toggle('active', s === id);
  });
}
function shake(intensity) {
  intensity = intensity || 8;
  gsap.to('#oripa-stage', { x: -intensity, duration: 0.05, yoyo: true, repeat: 7, onComplete: function() { gsap.set('#oripa-stage', { x: 0 }); } });
}
function flash(color, duration) {
  color = color || '#fff';
  duration = duration || 0.4;
  const f = document.createElement('div');
  f.style.cssText = 'position:absolute;inset:0;background:' + color + ';opacity:1;pointer-events:none;z-index:100;';
  $('screen-play').appendChild(f);
  gsap.to(f, { opacity: 0, duration: duration, onComplete: function() { f.remove(); } });
}

function drawResult() {
  const r = Math.random();
  if (r < 0.001) return 'SSR';
  if (r < 0.01) return 'SR';
  if (r < 0.1) return 'R';
  return 'N';
}
function pickColor(rarity) {
  const r = Math.random();
  if (rarity === 'SSR') return 'rainbow';
  if (rarity === 'SR') return r < 0.5 ? 'red' : 'rainbow';
  if (rarity === 'R') return r < 0.4 ? 'green' : (r < 0.7 ? 'red' : 'blue');
  if (r < 0.4) return 'blue';
  if (r < 0.65) return 'green';
  if (r < 0.8) return 'red';
  if (r < 0.83) return 'rainbow';
  return 'blue';
}
function pickRoute(color) {
  const r = Math.random();
  if (color === 'blue' || color === 'green') {
    if (r < 0.6) return 'nera';
    if (r < 0.8) return 'hissatsu';
    if (r < 0.9) return 'yokoku';
    return 'kurun';
  }
  if (color === 'red') {
    if (r < 0.25) return 'harakiri';
    if (r < 0.5) return 'yokoku';
    if (r < 0.75) return 'hissatsu';
    if (r < 0.9) return 'nera';
    return 'kurun';
  }
  if (r < 0.3) return 'kurun';
  if (r < 0.55) return 'yokoku';
  if (r < 0.8) return 'hissatsu';
  return 'harakiri';
}

// オリパーマン落下と発光
function glowOripaman(color) {
  const c = COLORS[color];
  const butsu = $('butsu');
  // 画像版：filter で発光感を出す
  if (color === 'rainbow') {
    butsu.style.filter = 'drop-shadow(0 0 30px #FF0000) drop-shadow(0 0 50px #FFD700) drop-shadow(0 0 70px #00FF00) drop-shadow(0 0 90px #1E90FF) brightness(1.3)';
  } else {
    butsu.style.filter = 'drop-shadow(0 0 30px ' + c.glow + ') drop-shadow(0 0 60px ' + c.glow + ') drop-shadow(0 0 100px ' + c.glow + ') brightness(1.2)';
  }
  gsap.to('#butsu', { scale: 1.15, duration: 0.4, yoyo: true, repeat: 3, ease: 'sine.inOut' });
}
function resetOripaman() {
  const butsu = $('butsu');
  butsu.style.filter = 'none';
  gsap.set('#butsu', { scale: 1 });
}
function playButsuOchika() {
  resetOripaman();
  gsap.set('#butsu-wrap', { y: 0, opacity: 1 });
  gsap.set('#butsu', { y: -350 });
  return new Promise(function(res) {
    gsap.to('#butsu', { y: 200, duration: 0.7, ease: 'bounce.out', onComplete: function() {
      shake(); flash('#fff', 0.3);
      setTimeout(res, 500);
    }});
  });
}
function playGlowSuggest(color) {
  return new Promise(function(res) {
    flash(COLORS[color].main, 0.6);
    setTimeout(function() {
      glowOripaman(color);
      const label = $('suggest-label');
      label.textContent = COLORS[color].name.toUpperCase();
      label.style.color = color === 'rainbow' ? '#FFD700' : COLORS[color].main;
      label.style.textShadow = '0 0 10px ' + COLORS[color].glow;
      gsap.to(label, { opacity: 1, duration: 0.5 });
    }, 200);
    setTimeout(function() { gsap.to('#suggest-label', { opacity: 0, duration: 0.3 }); }, 1800);
    setTimeout(res, 2200);
  });
}
function transitionToEnsyu() {
  return new Promise(function(res) {
    gsap.to('#butsu', { scale: 1.5, duration: 0.4 });
    setTimeout(function() {
      flash('#fff', 0.5);
      gsap.to('#butsu-wrap', { opacity: 0, scale: 0.3, duration: 0.3 });
    }, 400);
    setTimeout(res, 900);
  });
}

// ============== リール（次回予告） ==============
const REEL_LEFT  = ['W','R','B','C','L','7','R','W','B'];
const REEL_MID   = ['L','C','7','R','W','L','B','R','C'];
const REEL_RIGHT = ['R','L','C','W','7','B','L','R','C'];

function symHTML(s) {
  // 画像で表示する場合の代替：絵文字+テキストで描画
  if (s === '7') return '<div class="sym sym-7">7</div>';
  if (s === 'B') return '<div class="sym sym-bar">BAR</div>';
  if (s === 'C') return '<div class="sym sym-cherry">🍒</div>';
  if (s === 'W') return '<div class="sym sym-watermelon">🍉</div>';
  if (s === 'L') return '<div class="sym sym-bell">🔔</div>';
  if (s === 'R') return '<div class="sym sym-replay">RP</div>';
  return '';
}
function reelHTML(innerId, symbols) {
  const all = symbols.concat(symbols).concat(symbols);
  let inner = '';
  for (let i = 0; i < all.length; i++) {

  await new Promise(function(res) {

      }
      const easedProgress = 1 - Math.pow(1 - progress, 4);
      const currentAngle = -Math.PI / 2 + easedProgress * totalSpins * Math.PI * 2;

      ballEl.style.transform = 'translate(' + (cx + currentRadius * Math.cos(currentAngle) - 130) + 'px, ' + (cy + currentRadius * Math.sin(currentAngle) - 20) + 'px)';

    area.innerHTML = '';
    return { isHit: false };
  }
}

  const chargePerClick = isHit ? (color === 'rainbow' ? 25 : 8) : 3;

  let timerRunning = true;
  const gaugeInner = $('gauge-inner');
  const gaugePct = $('gauge-pct');
  const timeLeftEl = $('time-left');
  const punchBtn = $('punch-btn');
  function tick() {
    if (!timerRunning) return;
    const elapsed = performance.now() - startTime;
    const remaining = Math.max(0, duration - elapsed) / 1000;
    timeLeftEl.textContent = remaining.toFixed(1) + 's';
    if (remaining > 0) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  let autoChargeId = null;

    autoChargeId = setInterval(function() {
      if (!timerRunning) { clearInterval(autoChargeId); return; }
      charge = Math.min(100, charge + 2);
      gaugeInner.style.width = charge + '%';
      gaugePct.textContent = Math.floor(charge) + '%';
      if (charge >= 100 && !maxReached) { maxReached = true; gaugeInner.classList.add('max'); flash('#FFD700', 0.3); }
    }, 80);
  }
  function handlePunch() {
    if (!timerRunning) return;

    gaugePct.textContent = Math.floor(charge) + '%';
    gsap.fromTo('#oripa-pose', { scale: 0.95 }, { scale: 1, duration: 0.15, ease: 'back.out' });

  }
  punchBtn.addEventListener('click', handlePunch);
  punchBtn.addEventListener('touchstart', function(e) { e.preventDefault(); handlePunch(); });
  await new Promise(function(r) { setTimeout(r, duration); });
  timerRunning = false;
  if (autoChargeId) clearInterval(autoChargeId);
  punchBtn.style.pointerEvents = 'none';
  punchBtn.style.opacity = '0.4';
  if (maxReached) {
    flash('#fff', 0.6); shake(16);
    area.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;position:relative;">' +
        '<div style="font-size:36px;font-weight:900;letter-spacing:8px;font-family:\'Noto Serif JP\',serif;color:' + (color === 'rainbow' ? '#FFD700' : c.main) + ';text-shadow:0 0 30px ' + c.glow + ';">必殺技発動！</div>' +
        '<img src="' + IMG.oripaman_hissatsu + '" alt="必殺技" style="height:280px;filter:drop-shadow(0 0 60px ' + c.glow + ');">' +
        '<div style="font-size:22px;color:#FFD700;font-weight:900;letter-spacing:6px;text-shadow:0 0 20px #FFD700;font-family:\'Orbitron\',\'Arial Black\',sans-serif;">オリパビーム！</div>' +
      '</div>';
    gsap.fromTo(area.firstChild.firstChild, { scale: 0, rotation: -180 }, { scale: 1, rotation: 0, duration: 0.5, ease: 'back.out' });
    setTimeout(function() { flash(c.main, 0.5); }, 300);
    setTimeout(function() { flash('#FFD700', 0.5); }, 600);
    await new Promise(function(r) { setTimeout(r, 1800); });
    $('bg-stage').style.background = '#0a0a0a';
    area.innerHTML = '';
    return { isHit: true };
  } else {
    area.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;gap:20px;">' +
        '<div style="color:#666;font-size:22px;letter-spacing:4px;">…チャージ不足</div>' +
        '<img src="' + IMG.oripaman_down + '" alt="敗北" style="height:260px;opacity:0.7;">' +
      '</div>';
    gsap.fromTo(area.firstChild, { opacity: 0 }, { opacity: 1, duration: 0.5 });
    await new Promise(function(r) { setTimeout(r, 1500); });
    $('bg-stage').style.background = '#0a0a0a';

    return { isHit: false };
  }
}

function getStopIndices(yokoku, mode) {
  const len = 9;
  function nrm(i) { return norm(i, len); }
  if (yokoku === 'weakcherry') {
    if (mode === 'bake') return { left: idxOf(REEL_LEFT, 'W'), mid: idxOf(REEL_MID, 'C'), right: 0 };
    return { left: idxOf(REEL_LEFT, 'C'), mid: idxOf(REEL_MID, 'C'), right: 0 };
  }
  if (yokoku === 'watermelon') {
    if (mode === 'bake') return { left: nrm(idxOf(REEL_LEFT, 'W') + 1), mid: idxOf(REEL_MID, 'W'), right: nrm(idxOf(REEL_RIGHT, 'B') - 1) };
    return { left: nrm(idxOf(REEL_LEFT, 'W') + 1), mid: idxOf(REEL_MID, 'W'), right: nrm(idxOf(REEL_RIGHT, 'W') - 1) };
  }
  if (yokoku === 'chance') return { left: nrm(idxOf(REEL_LEFT, 'W') + 1), mid: idxOf(REEL_MID, 'W'), right: nrm(idxOf(REEL_RIGHT, 'B') - 1) };
  if (yokoku === 'strongcherry') return { left: idxOf(REEL_LEFT, 'C'), mid: idxOf(REEL_MID, 'C'), right: idxOf(REEL_RIGHT, 'C') };
  if (yokoku === 'strongchance') return { left: idxOf(REEL_LEFT, 'R'), mid: idxOf(REEL_MID, 'R'), right: idxOf(REEL_RIGHT, '7') };
  return { left: 4, mid: 0, right: 0 };
}

async function playJikaiYokoku(color, yokokuType, mode) {
  const area = $('ensyu-area');
  $('bg-stage').style.background = '#1a1a1a';
  const cellHeight = 56;
  area.innerHTML =
    '<div class="yokoku" style="display:flex;flex-direction:column;width:100%;height:100%;gap:10px;padding:10px 0;">' +
      '<div id="lcd" class="lcd-frame">' +
        '<div class="lcd-content" id="lcd-content"><div class="lcd-normal">REGULAR</div></div>' +
      '</div>' +
      '<div id="reel-zone" style="display:flex;justify-content:center;align-items:center;gap:6px;position:relative;">' +
        reelHTML('reel-inner-left', REEL_LEFT) + reelHTML('reel-inner-mid', REEL_MID) + reelHTML('reel-inner-right', REEL_RIGHT) +
      '</div>' +
    '</div>';
  startReel('reel-inner-left', REEL_LEFT, cellHeight);
  startReel('reel-inner-mid', REEL_MID, cellHeight);
  startReel('reel-inner-right', REEL_RIGHT, cellHeight);
  await new Promise(function(r) { setTimeout(r, 600); });
  const lcd = $('lcd-content');
  let lcdHTML = '';
  if (yokokuType === 'weakcherry') lcdHTML = '<div class="yokoku-icon">🍒</div><div class="yokoku-label">CHERRY</div>';
  else if (yokokuType === 'watermelon') lcdHTML = '<div class="yokoku-icon">🍉</div><div class="yokoku-label">WATERMELON</div>';
  else if (yokokuType === 'chance') lcdHTML = '<div class="yokoku-text-blue">CHANCE</div>';
  else if (yokokuType === 'strongcherry') lcdHTML = '<div class="yokoku-icon" style="filter:drop-shadow(0 0 15px gold);">🍒🍒🍒</div><div class="yokoku-label" style="color:#FFD700;text-shadow:0 0 15px #FFD700;">STRONG CHERRY</div>';
  else if (yokokuType === 'strongchance') lcdHTML = '<div class="yokoku-text-red">CHANCE</div>';
  flash('#fff', 0.2);
  lcd.innerHTML = lcdHTML;
  gsap.fromTo(lcd, { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out' });
  gsap.to('#lcd', { boxShadow: '0 0 30px rgba(255,215,0,0.6), inset 0 0 30px rgba(255,215,0,0.3)', duration: 0.3 });
  await new Promise(function(r) { setTimeout(r, 1200); });
  const indices = getStopIndices(yokokuType, mode);
  await stopReelAt('reel-inner-left', REEL_LEFT, indices.left, cellHeight, 0.5);
  if (mode === 'bake' && yokokuType === 'weakcherry') {
    await new Promise(function(r) { setTimeout(r, 300); });
    flash('#FFD700', 0.4); shake(10);
    $('lcd').style.background = 'linear-gradient(135deg, #00FF00, #FFD700)';
    lcd.innerHTML = '<div style="font-size:24px;font-weight:900;color:#fff;text-shadow:0 0 15px #000;letter-spacing:4px;">スイカ！？</div><div class="yokoku-icon">🍉</div>';
    gsap.fromTo(lcd, { scale: 0.5 }, { scale: 1, duration: 0.3, ease: 'back.out' });
  }
  await new Promise(function(r) { setTimeout(r, 300); });
  await stopReelAt('reel-inner-mid', REEL_MID, indices.mid, cellHeight, 0.5);
  await new Promise(function(r) { setTimeout(r, 400); });
  await stopReelAt('reel-inner-right', REEL_RIGHT, indices.right, cellHeight, 0.6);
  if (mode === 'bake' && yokokuType === 'watermelon') {
    await new Promise(function(r) { setTimeout(r, 200); });
    flash('#FFD700', 0.4); shake(10);
    $('lcd').style.background = 'linear-gradient(135deg, #FF0000, #FFD700)';
    lcd.innerHTML = '<div style="font-size:24px;font-weight:900;color:#fff;text-shadow:0 0 15px #000;letter-spacing:4px;">チャンス目！？</div><div class="yokoku-text-blue" style="font-size:22px;">CHANCE</div>';
    gsap.fromTo(lcd, { scale: 0.5 }, { scale: 1, duration: 0.3, ease: 'back.out' });
  }
  await new Promise(function(r) { setTimeout(r, 800); });
  const isHit = mode === 'bake' ? true : (mode === 'normal_hit');
  if (isHit) {
    if (mode === 'bake') {
      flash('#FFD700', 0.6); shake(14);
      $('lcd').style.background = RAINBOW_GRAD;
      $('lcd').style.backgroundSize = '400% 400%';
      lcd.innerHTML = '<img src="' + IMG.kakutei + '" alt="確定" style="max-width:90%;max-height:100%;object-fit:contain;">';
      gsap.fromTo(lcd, { scale: 0, rotation: -15 }, { scale: 1, rotation: 0, duration: 0.5, ease: 'back.out' });
      await new Promise(function(r) { setTimeout(r, 1500); });
    }
    flash('#fff', 0.4);
    $('lcd').style.background = '#fff';
    $('lcd').style.backgroundSize = 'auto';
    lcd.innerHTML = '<img src="' + IMG.jikai_yokoku + '" alt="次回予告" style="max-width:90%;max-height:100%;object-fit:contain;">';
    gsap.fromTo(lcd, { scale: 0, rotation: -15 }, { scale: 1, rotation: 0, duration: 0.5, ease: 'back.out' });
    await new Promise(function(r) { setTimeout(r, 1200); });
    flash('#FFD700', 0.5); shake(12);
    $('lcd').style.background = 'linear-gradient(135deg, #FF0000, #FFD700)';
    lcd.innerHTML = '<img src="' + IMG.oo_atari + '" alt="大当たり" style="max-width:95%;max-height:100%;object-fit:contain;">';
    gsap.fromTo(lcd, { scale: 0 }, { scale: 1, duration: 0.4, ease: 'back.out' });
    await new Promise(function(r) { setTimeout(r, 1500); });
    $('bg-stage').style.background = '#0a0a0a';
    area.innerHTML = '';
    return { isHit: true, isBake: mode === 'bake' };
  } else {
    await new Promise(function(r) { setTimeout(r, 200); });
    $('lcd').style.background = 'linear-gradient(180deg, #0d1b3d 0%, #1a2f5c 100%)';
    $('lcd').style.boxShadow = 'inset 0 0 30px rgba(0,0,0,0.8)';
    lcd.innerHTML = '<div class="lcd-normal">REGULAR</div>';
    gsap.to('#reel-zone', { opacity: 0.4, duration: 0.5 });
    await new Promise(function(r) { setTimeout(r, 1200); });
    $('bg-stage').style.background = '#0a0a0a';
    area.innerHTML = '';
    return { isHit: false, isBake: false };
  }
}

// ============== メインフロー ==============
async function play(forcedColor, forcedRoute, forcedHit, forcedHoles, forcedYokoku, forcedMode) {
  if (isPlaying) return;
  isPlaying = true;
  pt -= 100;
  $('pt-display').textContent = pt.toLocaleString() + ' pt';
  showScreen('screen-play');
  gsap.set('#bg-stage', { background: '#0a0a0a' });

  let rarity, color, route, isHit, kurunHoles, yokokuType, yokokuMode;
  if (forcedColor && forcedRoute) {
    color = forcedColor;
    route = forcedRoute;
    rarity = (color === 'rainbow') ? 'SSR' : (color === 'red' ? 'SR' : (color === 'green' ? 'R' : 'N'));
    isHit = (forcedHit !== undefined && forcedHit !== null) ? (forcedHit === 1 || forcedHit === '1') : (rarity !== 'N');
    kurunHoles = forcedHoles ? parseInt(forcedHoles) : (isHit ? 1 : 0);
    yokokuType = forcedYokoku || 'watermelon';
    yokokuMode = forcedMode || (isHit ? 'normal_hit' : 'normal_miss');
  } else {
    rarity = drawResult();
    color = pickColor(rarity);
    route = pickRoute(color);
    isHit = rarity !== 'N';
    if (route === 'kurun' && isHit) {
      if (color === 'rainbow') kurunHoles = Math.random() < 0.5 ? 4 : 3;
      else if (color === 'red') kurunHoles = Math.random() < 0.4 ? 2 : 1;
      else kurunHoles = 1;
    } else {
      kurunHoles = isHit ? 1 : 0;
    }
    if (route === 'yokoku') {
      const ry = Math.random();
      if (ry < 0.35) yokokuType = 'weakcherry';
      else if (ry < 0.65) yokokuType = 'watermelon';
      else if (ry < 0.85) yokokuType = 'chance';
      else if (ry < 0.95) yokokuType = 'strongcherry';
      else yokokuType = 'strongchance';
      if (isHit && (yokokuType === 'weakcherry' || yokokuType === 'watermelon') && Math.random() < 0.2) {
        yokokuMode = 'bake';
      } else {
        yokokuMode = isHit ? 'normal_hit' : 'normal_miss';
      }
    }
  }
  console.log('[GACHA]', { rarity: rarity, color: color, route: route, isHit: isHit });

  await playButsuOchika();
  await playGlowSuggest(color);
  await transitionToEnsyu();

  let ensyuResult = { isHit: isHit };
  if (route === 'nera') ensyuResult = await playNeraEnsyu(color, isHit);
  else if (route === 'harakiri') ensyuResult = await playHarakiri(color, isHit);
  else if (route === 'yokoku') ensyuResult = await playJikaiYokoku(color, yokokuType, yokokuMode);
  else if (route === 'kurun') ensyuResult = await playKurun(color, kurunHoles);
  else if (route === 'hissatsu') ensyuResult = await playHissatsu(color, isHit);

  setTimeout(function() {
    const routeHasJudge = ['nera','harakiri','kurun','hissatsu','yokoku'].indexOf(route) !== -1;
    if (routeHasJudge) {
      $('result-status').textContent = ensyuResult.isHit ? (ensyuResult.isBake ? '🎉 化け確定！ 🎉' : '🎉 当たり 🎉') : 'ハズレ…';
      $('result-status').style.color = ensyuResult.isHit ? '#FFD700' : '#666';
    } else {
      $('result-status').textContent = '';
    }
    const finalRarity = !ensyuResult.isHit ? 'N' : (ensyuResult.isBake ? 'SR' : rarity);
    $('result-rarity').textContent = finalRarity;
    $('result-rarity').style.color = finalRarity === 'SSR' ? '#FFD700' : (finalRarity === 'SR' ? '#FF1493' : (finalRarity === 'R' ? '#1E90FF' : '#888'));
    showScreen('screen-result');
    isPlaying = false;
  }, 400);
}

function init() {
  $('gacha-btn').addEventListener('click', function() { play(); });
  $('retry-btn').addEventListener('click', function() { showScreen('screen-home'); });
  setupDebugButtons();
  console.log('[ORIPAMAN] Initialized');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
